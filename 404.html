<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml">
<head>
<script src="js/storage-guard.js"></script>
<script src="js/source-guard.js"></script>
<script type="text/javascript">
    var siteClosed = localStorage.getItem("site_collapsed") === "true";
</script>
<meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
<title>404 Not Found</title>
<style type="text/css">
    body { 
        margin: 0; 
        padding: 0; 
        background: #f7f1e3; 
        font-family: "宋体", Arial, sans-serif; 
        font-size: 14px; 
        color: #333; 
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
    }
    .error-container {
        text-align: center;
        padding: 40px;
        background: #fff;
        border: 1px solid #d4c4a8;
        box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        border-radius: 4px;
        max-width: 500px;
    }
    .error-text {
        font-weight: bold;
        color: #cc3300;
        margin-bottom: 20px;
    }
    .back-link {
        font-size: 12px;
        color: #0055aa;
        text-decoration: none;
    }
    .back-link:hover {
        text-decoration: underline;
    }
</style>
</head>
<body>

<div class="error-container">
    <div class="error-text" id="err-main">抱歉，您请求的资源已丢失或无法点开！</div>
    <div class="error-sub" id="err-sub" style="display:none; color:#666; line-height:1.8; margin-bottom:18px; font-size:13px;"></div>
    <div>
        <a href="javascript:history.back();" class="back-link">&lt;&lt; 返回上一页</a>
    </div>
</div>

<script type="text/javascript">
    if (siteClosed) {
        document.getElementById("err-sub").style.display = "block";
        document.getElementById("err-sub").innerHTML =
            "本站已于 <strong>2012年</strong> 正式关闭运营，相关子页面数据已无法恢复。<br/>" +
            "如需技术支持，请联系官网运维邮箱：<strong style=\"color:#cc3300;\">hgyz0715@oo.com</strong>";
    }
    // 如果该页面是打开的状态，当LocalStorage发生变化时强制进行刷新
    window.addEventListener('storage', function(e) {
        window.location.reload();
    });
</script>
<script src="js/disclaimer.js"></script>
<script src="js/browse-history.js"></script>
<script src="js/link-new-tab.js"></script>
</body>
</html>
