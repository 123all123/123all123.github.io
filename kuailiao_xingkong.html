<!DOCTYPE html>
<html lang="zh-CN">
<head>
<script src="js/storage-guard.js"></script>
<script src="js/source-guard.js"></script>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="description" content="快聊 - 用户「星空法师」的个人主页。" />
<title>星空法师 的快聊主页 · 快聊</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: "Microsoft YaHei",Arial,sans-serif; background: #0e1330; color: #cdd6ea; font-size: 13px; }
  a { color: #8ab4ff; text-decoration: none; }
  #top { height: 48px; background: #1b2450; display: flex; align-items: center; padding: 0 24px; color: #fff; }
  #top .brand { font-size: 20px; font-weight: bold; }
  #top .brand small { font-size: 11px; opacity: .8; font-weight: normal; margin-left: 6px; }
  .wrap { max-width: 720px; margin: 24px auto; padding: 0 12px; }
  .card { background: #141a3a; border: 1px solid #27305c; border-radius: 10px; }
  .profile { padding: 28px; display: flex; gap: 20px; align-items: center; }
  .avatar { width: 92px; height: 92px; border-radius: 50%; overflow: hidden; flex-shrink: 0; border: 2px solid #27305c; }
  .avatar img { width: 100%; height: 100%; object-fit: cover; object-position: center top; display: block; }
  .uname { font-size: 22px; font-weight: bold; color: #eaf0ff; }
  .bio { color: #9aa6cc; line-height: 1.9; margin-top: 8px; }
  .bio b { color: #c3ccec; }
  .stats { display: flex; gap: 30px; border-top: 1px solid #222a52; padding: 16px 28px; color: #8590bb; }
  .stats b { color: #eaf0ff; }
  .empty { text-align: center; color: #6b76a3; padding: 60px 20px; }
  .empty .big { font-size: 40px; margin-bottom: 12px; }
</style>
</head>
<body>
<div id="top"><span class="brand">快聊<small>KuaiLiao</small></span></div>
<div class="wrap">
  <div class="card">
    <div class="profile">
      <div class="avatar"><img src="images/sf.png" alt="星空法师" /></div>
      <div>
        <div class="uname">星空法师</div>
        <div class="bio">
          <b>签名：</b>把说不出口的话，都画进星空里。<br/>
          <b>生日：</b>1980-02-14<br/>
          <b>标签：</b>#插画 #星空 #夜晚
        </div>
      </div>
    </div>
    <div class="stats"><div>动态 <b>0</b></div><div>关注 <b>36</b></div><div>粉丝 <b>1,908</b></div></div>
  </div>

  <div class="card" style="margin-top:18px;">
    <div class="empty">
      <div class="big">🌠</div>
      TA 还没有发布任何动态。<br/>
      <span style="font-size:12px;">「有些人习惯在别人的故事里，做一颗安静的星。」</span>
    </div>
  </div>
</div>
<script src="js/disclaimer.js"></script>
<script src="js/browse-history.js"></script>
<script src="js/link-new-tab.js"></script>
</body>
</html>
