    border: none;
    background: transparent;
    color: #444;

        "<h2>目标</h2><p>呼唤名字，达成结局。</p>" +
        "<h3>思路</h3><ul>" +
        "<li>黑屏后要输入<b>你要互换的名字</b>。</li>" +
        "<li>呼唤失败的时候，提示是有用的</li>" +
        "<li>重新回到智搜工具，看看工具的名字是否存在不一样的地方</li>" +
        "</ul>"
    },
    full: {
      body: "<span class=\"tag full\">完整提示 · 含操作</span>" +
        "<h2>具体操作</h2><ol>" +
        "<li>图片、文字、音频的解密工具名字中有单词是高亮的，拼接可得<code>xor</code></li>" +
        "<li>搜索<code>xor</code>，将三段密钥进行异或运算，得到<code>xor</code>运算结果，之后再将这串16进制文本解码为字符串</li>" +
        "<li>呼唤最终的结果，达成结局" +
        "</ol>" +
        "<p><b>坏结局</b>：洗脑时选「我……愿意」→ <code>badend.html</code>，可回智搜重开。</p>"
    }
  }
};

(function () {
  var stageId = 0;
  var mode = "simple";
  var contentEl = document.getElementById("guide-content");
  var stageBtns = document.querySelectorAll(".stage-btn");
  var tabBtns = document.querySelectorAll(".tab");

  function render() {
    var data = GUIDE[stageId];
    if (!data) return;
    var block = data[mode];
    contentEl.innerHTML = "<h2>" + data.title + "</h2>" + block.body;
  }

  stageBtns.forEach(function (btn) {
    btn.addEventListener("click", function () {
      stageId = parseInt(btn.getAttribute("data-id"), 10);
      stageBtns.forEach(function (b) { b.classList.remove("active"); });
      btn.classList.add("active");
      render();
    });
  });

  tabBtns.forEach(function (btn) {
    btn.addEventListener("click", function () {
      mode = btn.getAttribute("data-mode");
      tabBtns.forEach(function (b) { b.classList.remove("active"); });
      btn.classList.add("active");
      render();
    });
  });

  var params = new URLSearchParams(location.search);
  var qStage = parseInt(params.get("stage"), 10);
  if (!isNaN(qStage) && GUIDE[qStage]) {
    stageId = qStage;
    stageBtns.forEach(function (b) {
      b.classList.toggle("active", parseInt(b.getAttribute("data-id"), 10) === stageId);
    });
  }
  if (params.get("mode") === "full") {
    mode = "full";
    tabBtns.forEach(function (b) {
      b.classList.toggle("active", b.getAttribute("data-mode") === "full");
    });
  }

  render();
})();
</script>
<script src="js/browse-history.js"></script>
<script src="js/link-new-tab.js"></script>
</body>
</html>
