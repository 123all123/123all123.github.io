        // ================= 交互控制中心 =================
        const homePage = document.getElementById('home-page');
        const resultsPage = document.getElementById('results-page');
        const mainSearchInput = document.getElementById('main-search-input');
        const mainSearchBtn = document.getElementById('main-search-btn');
        const headerSearchInput = document.getElementById('header-search-input');
        const headerSearchBtn = document.getElementById('header-search-btn');
        const backToHome = document.getElementById('back-to-home');
        const searchStats = document.getElementById('search-stats');
        const resultsList = document.getElementById('results-list');

        // 动态关键词高亮引擎
        function highlightKeyword(text, keyword) {
            if (!keyword) return text;
            const keys = keyword.split(' ').filter(k => k.trim() !== '');
            let highlightedText = text;
            keys.forEach(key => {
                if(key.length > 0) {
                    const regex = new RegExp(`(${key})`, 'gi');
                    highlightedText = highlightedText.replace(regex, '<em>$1</em>');
                }
            });
            return highlightedText;
        }

        function normalizeQuery(s) {
            return (s || '').trim().toLowerCase().replace(/\s+/g, ' ');
        }

        function isExactKeywordMatch(query, kw) {
            return normalizeQuery(query) === normalizeQuery(kw);
        }

        function isLocalPage(url) {
            if (!url) return false;
            if (/^https?:\/\//i.test(url)) return false;
            if (url.indexOf("javascript:") === 0) return false;
            return /\.html/i.test(url);
        }

        function formatHistoryTime(ts) {
            if (!ts) return "";
            var d = new Date(ts);
            var pad = function (n) { return n < 10 ? "0" + n : "" + n; };
            return d.getFullYear() + "-" + pad(d.getMonth() + 1) + "-" + pad(d.getDate()) + " " + pad(d.getHours()) + ":" + pad(d.getMinutes());
        }

        function renderBrowseHistory() {
            var list = (window.ARGBrowseHistory && ARGBrowseHistory.load()) || [];
            var pairs = [
                { ul: document.getElementById("home-history-list"), empty: document.getElementById("home-history-empty") },
                { ul: document.getElementById("results-history-list"), empty: document.getElementById("results-history-empty") }
            ];
            pairs.forEach(function (pair) {
                if (!pair.ul) return;
                pair.ul.innerHTML = "";
                if (!list.length) {
                    if (pair.empty) pair.empty.classList.remove("hide");
                    return;
                }
                if (pair.empty) pair.empty.classList.add("hide");
                list.forEach(function (item) {
                    var li = document.createElement("li");
                    var a = document.createElement("a");
                    a.href = item.url;
                    a.target = "_blank";
                    a.rel = "noopener noreferrer";
                    var title = document.createElement("span");
                    title.className = "hist-title";
                    title.textContent = item.title || item.url;
                    var time = document.createElement("span");
                    time.className = "hist-time";
                    time.textContent = formatHistoryTime(item.time);
                    a.appendChild(title);
                    a.appendChild(time);
                    li.appendChild(a);
                    pair.ul.appendChild(li);
                });
            });
        }

        // 核心搜索执行逻辑（精准匹配关键词）
        function doSearch(keyword) {
            keyword = keyword.trim();
            if (!keyword) return;
            
            homePage.classList.add('hide');
            resultsPage.classList.remove('hide');
            headerSearchInput.value = keyword;
            
            const matchedResults = searchData.filter(item =>
                item.keywords.some(kw => isExactKeywordMatch(keyword, kw))
            );

            const mockCount = matchedResults.length > 0 ? matchedResults.length : 0;
            searchStats.innerHTML = mockCount > 0
                ? `智搜为您精准匹配“<span style="color:#c00;">${keyword}</span>”共 ${mockCount} 条结果`
                : `未找到与“<span style="color:#c00;">${keyword}</span>”完全匹配的结果`;

            resultsList.innerHTML = '';
            if (matchedResults.length > 0) {
                matchedResults.forEach(item => {
                    const titleHtml = highlightKeyword(item.title, keyword);
                    const descHtml = highlightKeyword(item.desc, keyword);
                    const wrap = document.createElement('div');
                    wrap.className = 'result-item';
                    const local = isLocalPage(item.url);

                    if (local) {
                        const link = document.createElement('a');
                        link.href = item.url;
                        link.target = '_blank';
                        link.rel = 'noopener noreferrer';
                        link.className = 'result-title';
                        link.innerHTML = titleHtml;
                        wrap.appendChild(link);
                    } else {
                        const title = document.createElement('span');
                        title.className = 'result-title disabled';
                        title.innerHTML = titleHtml;
                        wrap.appendChild(title);
                        const urlLine = document.createElement('div');
                        urlLine.className = 'result-url';
                        urlLine.textContent = item.url;
                        wrap.appendChild(urlLine);
                    }

                    const desc = document.createElement('p');
                    desc.className = 'result-desc';
                    desc.innerHTML = descHtml;
                    wrap.appendChild(desc);
                    resultsList.appendChild(wrap);
                });
            } else {
                resultsList.innerHTML = `
                    <div class="no-results">
                        <p>抱歉，没有找到与“<em>${keyword}</em>”完全匹配的网页。</p>
                    </div>
                `;
            }
        }

        // ================= 事件指令绑定 =================
        mainSearchBtn.addEventListener('click', () => doSearch(mainSearchInput.value));
        mainSearchInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') doSearch(mainSearchInput.value);
        });

        headerSearchBtn.addEventListener('click', () => doSearch(headerSearchInput.value));
        headerSearchInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') doSearch(headerSearchInput.value);
        });

        backToHome.addEventListener('click', () => {
            resultsPage.classList.add('hide');
            homePage.classList.remove('hide');
            mainSearchInput.value = '';
            renderBrowseHistory();
            mainSearchInput.focus();
        });

        window.onload = () => {
            renderBrowseHistory();
            mainSearchInput.focus();
            applyVoidToolsHint();
        };

        function applyVoidToolsHint() {
            var on = localStorage.getItem("arg_void_trap") === "active";
            document.querySelectorAll(".tools-btn, .header-tools").forEach(function (el) {
                if (on) el.classList.add("void-tools-hint");
                else el.classList.remove("void-tools-hint");
            });
        }

        document.addEventListener('visibilitychange', function () {
            if (!document.hidden) {
                renderBrowseHistory();
                applyVoidToolsHint();
            }
        });

        // 清除所有本地存储数据并刷新
        function clearAllData() {
            if (confirm("确定要清除所有的游戏进度和本地存储数据吗？")) {
                localStorage.clear();
                alert("本地存储数据已清空，游戏进度已重置。");
                window.location.reload();
            }
        }

        // 跨标签页同步游戏状态
        window.addEventListener('storage', function() {
            window.location.reload();
        });
    </script>
