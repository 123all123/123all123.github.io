<!DOCTYPE html>
<html lang="zh-CN">
<head>
<script src="js/storage-guard.js"></script>
<script src="js/source-guard.js"></script>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="description" content="十六进制转字符串工具：将十六进制字节序列按 UTF-8 解码为可读文本。" />
<title>十六进制转字符串工具 - 智搜工具</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: "Segoe UI","Microsoft YaHei",Arial,sans-serif; background: #0f1420; color: #d6e2f0; padding: 28px 16px; }
  .wrap { max-width: 720px; margin: 0 auto; }
  h1 { color: #6cc4ff; font-size: 22px; margin-bottom: 6px; }
  .sub { color: #7d8ba3; font-size: 13px; margin-bottom: 22px; }
  .card { background: #171e2e; border: 1px solid #26314a; border-radius: 10px; padding: 20px; margin-bottom: 18px; }
  label { display: block; font-size: 13px; color: #9fb2cc; margin-bottom: 8px; }
  textarea { width: 100%; min-height: 100px; padding: 12px; background: #0f1626; border: 1px solid #2c3a57; border-radius: 6px; color: #eaf2ff; font-family: Consolas, monospace; font-size: 14px; letter-spacing: 1px; resize: vertical; }
  textarea:focus { outline: none; border-color: #4a90e2; }
  .btn { cursor: pointer; border: none; border-radius: 6px; padding: 11px 18px; font-size: 14px; font-weight: 600; background: linear-gradient(180deg,#4a90e2,#2f6dc0); color: #fff; margin-top: 14px; }
  .result { background: #0d1a12; border: 1px solid #1f4a2e; border-radius: 8px; padding: 16px; margin-top: 16px; display: none; }
  .result .k { color: #7d8ba3; font-size: 12px; margin-bottom: 6px; }
  .result .txt { font-family: Consolas, monospace; color: #6effa0; font-size: 16px; word-break: break-all; line-height: 1.7; }
  .err { color: #ff7676; font-size: 13px; margin-top: 12px; display: none; }
  .tip { background: #141b2b; border-left: 3px solid #4a90e2; padding: 12px 14px; border-radius: 0 6px 6px 0; color: #9fb2cc; font-size: 12px; line-height: 1.7; margin-top: 8px; }
  code { background: #223052; padding: 1px 5px; border-radius: 3px; color: #b9d4ff; }
  a { color: #6cc4ff; font-size: 13px; }
</style>
</head>
<body>
<div class="wrap">
  <h1>🔢 十六进制转字符串</h1>
  <div class="sub">将十六进制字节序列按 UTF-8 解码为可读文本（自动忽略空格、冒号等分隔符）。</div>
  <div class="card">
    <label>十六进制输入</label>
    <textarea id="input" placeholder="粘贴十六进制内容" autocomplete="off"></textarea>
    <button class="btn" onclick="convert()">转 换</button>
    <div class="err" id="err"></div>
    <div class="result" id="result">
      <div class="k">UTF-8 解码结果：</div>
      <div class="txt" id="out"></div>
    </div>
  </div>
  <p style="margin-top:18px;"><a href="tools_hub.html">&larr; 返回工具中心</a> · <a href="find.html">智搜首页</a></p>
</div>
<script src="js/keys.js"></script>
<script>
  function convert() {
    var raw = document.getElementById("input").value.trim();
    var err = document.getElementById("err");
    var res = document.getElementById("result");
    err.style.display = "none";
    res.style.display = "none";
    if (!raw) { err.textContent = "✖ 请输入十六进制内容。"; err.style.display = "block"; return; }
    var text = ARGKeys.hexToStr(raw);
    if (text === null) {
      err.textContent = "✖ 输入包含非十六进制字符，或长度为奇数，请检查。";
      err.style.display = "block";
      return;
    }
    document.getElementById("out").textContent = text || "（空字符串）";
    res.style.display = "block";
  }
</script>
<script src="js/disclaimer.js"></script>
<script src="js/browse-history.js"></script>
<script src="js/link-new-tab.js"></script>
</body>
</html>
